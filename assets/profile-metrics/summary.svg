<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Contribution summary pending sync</title>
  <desc id="desc">Authenticated contribution summary will appear here after the workflow runs.</desc>
  <rect width="720" height="220" rx="18" fill="#161b22" stroke="#30363d"/>
  <text x="32" y="44" fill="#f0f6fc" font-size="22" font-weight="700">Contribution Summary</text>
  <text x="688" y="44" fill="#8b949e" font-size="12" text-anchor="end">Awaiting first authenticated sync</text>
  <text x="32" y="92" fill="#58a6ff" font-size="24" font-weight="800">Add PROFILE_METRICS_TOKEN</text>
  <text x="32" y="116" fill="#f0f6fc" font-size="14" font-weight="700">Repository secret required</text>
  <text x="32" y="136" fill="#8b949e" font-size="11">Use a classic PAT with read:user and repo so private contribution activity can be counted.</text>
  <text x="372" y="92" fill="#58a6ff" font-size="24" font-weight="800">Run workflow</text>
  <text x="372" y="116" fill="#f0f6fc" font-size="14" font-weight="700">Actions → Update Profile Metrics</text>
  <text x="372" y="136" fill="#8b949e" font-size="11">The workflow will generate local SVG assets and commit them back into this repository.</text>
</svg>
